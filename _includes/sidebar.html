<aside class="sidebar sidebar-left" aria-label="mobile navigation">
    <div class="side-info">
        <section class="nav-section">
            <p class="nav-label">글 분류</p>
            {% include navigation.html %}
        </section>

        <div id="contact">
            <p class="nav-label">링크</p>
            <ul class="contact-list">
                {% if site.github_username %}
                    <li><a aria-label="GitHub" href="https://github.com/{{ site.github_username }}">GitHub</a></li>
                {% endif %}
                {% if site.email %}
                    <li><a aria-label="Email" href="mailto:{{ site.email }}">Email</a></li>
                {% endif %}
                {% if site.linkedin_username %}
                    <li><a aria-label="LinkedIn" href="https://www.linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a></li>
                {% endif %}
                {% if site.twitter_username %}
                    <li><a aria-label="Twitter" href="https://twitter.com/{{ site.twitter_username }}">X</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</aside>
